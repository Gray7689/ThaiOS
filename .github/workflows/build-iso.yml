name: Build ThaiOS ISO

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Installa dipendenze
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            debootstrap squashfs-tools xorriso \
            grub-pc-bin grub-efi-amd64-bin grub-efi-amd64-signed shim-signed \
            isolinux syslinux-common mtools dosfstools \
            ca-certificates librsvg2-bin
          sudo rm -rf /var/lib/apt/lists/*

      - name: Build ThaiOS ISO
        run: sudo bash scripts/build-thaios-iso.sh all
        timeout-minutes: 90

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: ThaiOS-1.0-ISO
          path: build/ThaiOS-1.0.iso
          retention-days: 90
