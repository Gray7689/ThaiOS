DEFAULT thaios
PROMPT 1
TIMEOUT 100

UI menu.c32
MENU TITLE ThaiOS 1.0 - Songkran
MENU BACKGROUND splash.png
MENU COLOR border 0 #FFFFFFFF #00000000 none
MENU COLOR title 0 #FF6B35 #00000000 none
MENU COLOR sel 0 #FFFFFFFF #1A274488 none
MENU COLOR unsel 0 #E8EDF5 #00000000 none
MENU COLOR hotkey 0 #FF6B35 #00000000 none

LABEL thaios
  MENU LABEL Avvia ThaiOS 1.0
  KERNEL /boot/vmlinuz
  APPEND root=/dev/loop0 loop=/ThaiOS.squashfs ro quiet splash initrd=/boot/initrd.img

LABEL thaios-safe
  MENU LABEL ThaiOS 1.0 - Modalita provvisoria
  KERNEL /boot/vmlinuz
  APPEND root=/dev/loop0 loop=/ThaiOS.squashfs ro nomodeset initrd=/boot/initrd.img

LABEL thaios-text
  MENU LABEL ThaiOS 1.0 - Modalita testo
  KERNEL /boot/vmlinuz
  APPEND root=/dev/loop0 loop=/ThaiOS.squashfs ro systemd.unit=multi-user.target initrd=/boot/initrd.img

LABEL hdd
  MENU LABEL Avvia dal primo disco
  LOCALBOOT 0x80
