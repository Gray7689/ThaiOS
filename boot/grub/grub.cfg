set default=0
set timeout=5
set gfxmode=1920x1080
set gfxpayload=keep

insmod all_video
insmod gfxterm
insmod png
insmod ext2
insmod part_gpt
insmod iso9660
insmod loopback
insmod squash4

loadfont unicode

if background_image /boot/thaios-splash.png; then
  set color_normal=white/black
  set color_highlight=#FF6B35/black
else
  set menu_color_normal=#E8EDF5/#0F1A2E
  set menu_color_highlight=#FFFFFF/#1A2744
fi

menuentry "Avvia ThaiOS 1.0" --class thaios {
  loopback loop /ThaiOS.squashfs
  linux /boot/vmlinuz root=/dev/loop0 loop=/ThaiOS.squashfs ro quiet splash
  initrd /boot/initrd.img
}

menuentry "ThaiOS 1.0 - Modalita provvisoria" --class thaios {
  loopback loop /ThaiOS.squashfs
  linux /boot/vmlinuz root=/dev/loop0 loop=/ThaiOS.squashfs ro nomodeset
  initrd /boot/initrd.img
}

menuentry "ThaiOS 1.0 - Verifica memoria" --class memtest {
  linux /boot/memtest86+
}

menuentry "Avvia dal primo disco" --class hdd {
  insmod chain
  insmod ntfs
  chainloader (hd0)+1
}

submenu "Altre opzioni" {
  menuentry "ThaiOS 1.0 - Testo (nessuna GUI)" {
    loopback loop /ThaiOS.squashfs
    linux /boot/vmlinuz root=/dev/loop0 loop=/ThaiOS.squashfs ro systemd.unit=multi-user.target
    initrd /boot/initrd.img
  }
}
